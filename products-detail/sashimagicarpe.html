<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sorbet Sorbébé</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav class="container">
    <div class="logo">PokéFood</div>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="menu.html">Menu</a></li>
    </ul>
  </nav>
</header>

<section class="product-detail-section">
  <div class="container">

    <a href="menu.html" class="back-link">← Retour au menu</a>

    <div class="product-detail-wrapper">

      <!-- IMAGE -->
      <div class="product-image-container">
        <div class="product-detail-image sorbebet"></div>
      </div>

      <!-- INFOS -->
      <div class="product-info">

        <span class="product-category">Dessert</span>
        <h1 class="product-title">Sorbet Sorbébé</h1>

        <div class="product-rating">
          <span class="stars">⭐⭐⭐⭐⭐</span>
          <span class="rating-text">4.6/5</span>
        </div>

        <div class="product-price-section">
          <p class="product-price">5.99€</p>
        </div>

        <div class="product-description">
          <h3>Description</h3>
          <p>Un sorbet fruité et rafraîchissant, parfait pour les journées chaudes.</p>
        </div>

        <div class="product-ingredients">
          <h3>Ingrédients</h3>
          <p>Fruits frais, sucre, eau, citron</p>
        </div>

        <div class="product-actions">
          <input type="number" value="1" min="1" max="10" class="quantity-input">
          <button class="btn btn-large">Commander</button>
        </div>

      </div>

    </div>

  </div>
</section>

<footer>
  <p>© 2026 PokéFood</p>
</footer>

</body>
</html>
